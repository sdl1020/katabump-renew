name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb curl jq
          npm install
          npx playwright install-deps chrome

      - name: Fetch Webshare v3 Proxy
        env:
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
        run: |
          if [ -z "$WEBSHARE_API_KEY" ]; then
            echo "WEBSHARE_API_KEY is empty, running without proxy."
            echo "HTTP_PROXY=" >> "$GITHUB_ENV"
            echo "HTTPS_PROXY=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Fetching Webshare v3 proxy list..."

          RESPONSE=$(curl -fsSL \
            -H "Authorization: Bearer ${WEBSHARE_API_KEY}" \
            "https://proxy.webshare.io/api/v3/proxy/list?mode=direct&limit=50")

          echo "$RESPONSE" > proxies.json

          PROXY_LINE=$(jq -r '.results[0] | "\(.proxy_address),\(.port),\(.username),\(.password)"' proxies.json)

          if [ -z "$PROXY_LINE" ]; then
            echo "ERROR: No proxy found in Webshare v3 response."
            exit 1
          fi

          IP=$(echo "$PROXY_LINE" | cut -d',' -f1)
          PORT=$(echo "$PROXY_LINE" | cut -d',' -f2)
          PROXY_USER=$(echo "$PROXY_LINE" | cut -d',' -f3)
          PROXY_PASS=$(echo "$PROXY_LINE" | cut -d',' -f4)

          HTTP_PROXY_VALUE="http://${PROXY_USER}:${PROXY_PASS}@${IP}:${PORT}"

          echo "::add-mask::${HTTP_PROXY_VALUE}"
          echo "::add-mask::${PROXY_USER}"
          echo "::add-mask::${PROXY_PASS}"

          echo "HTTP_PROXY=${HTTP_PROXY_VALUE}" >> "$GITHUB_ENV"
          echo "HTTPS_PROXY=${HTTP_PROXY_VALUE}" >> "$GITHUB_ENV"

          echo "Selected Webshare v3 proxy: ${IP}:${PORT}"

      - name: Check proxy IP
        run: |
          echo "Direct IP:"
          curl --noproxy '*' -s https://api.ipify.org || true
          echo

          echo "Proxy IP:"
          curl -s -x "$HTTP_PROXY" https://api.ipify.org || true
          echo

      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js || echo "renew script failed but workflow continues"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
