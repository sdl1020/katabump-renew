name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Google Chrome and Dependencies
        run: |
          echo "=== 1. 预先导入 Google Chrome 官方公钥和配置软件源 ==="
          # 必须先下载并导入安全公钥，否则之后的 apt-get update 会因为验证失败而报错
          sudo wget -qO /etc/apt/trusted.gpg.d/google-chrome.asc https://dl.google.com/linux/linux_signing_key.pub
          
          # 用标准规范的格式覆写配置文件
          echo "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list

          echo "=== 2. 更新系统并安装基础依赖 ==="
          sudo apt-get update
          # 安装虚拟桌面环境 Xvfb 和工具
          sudo apt-get install -y xvfb curl jq
          
          echo "=== 3. 安装官方 Google Chrome 稳定版 ==="
          sudo apt-get install -y google-chrome-stable
          
          echo "=== 4. 安装项目 npm 依赖 ==="
          npm install

      - name: Webshare Proxy Fetch
        env:
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
        run: |
          if [ -z "$WEBSHARE_API_KEY" ]; then
            echo "WEBSHARE_API_KEY is empty, running without proxy."
            echo "HTTP_PROXY=" >> "$GITHUB_ENV"
            echo "HTTPS_PROXY=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Fetching Webshare proxy list..."

          RESPONSE=$(curl -sSL \
            -H "Authorization: Token ${WEBSHARE_API_KEY}" \
            "https://proxy.webshare.io/api/v2/proxy/list/?page=1&page_size=10&mode=direct")

          if echo "$RESPONSE" | jq -e '.detail' >/dev/null 2>&1; then
            echo "❌ Webshare API Error Response:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$RESPONSE" > proxies.json
          PROXY_LINE=$(jq -r '.results[0] | "\(.proxy_address),\(.port),\(.username),\(.password)"' proxies.json 2>/dev/null || echo "")

          if [ -z "$PROXY_LINE" ] || [ "$PROXY_LINE" = "null,null,null,null" ]; then
            echo "❌ ERROR: No proxy found in Webshare response. Full response below:"
            echo "$RESPONSE"
            exit 1
          fi

          IP=$(echo "$PROXY_LINE" | cut -d',' -f1)
          PORT=$(echo "$PROXY_LINE" | cut -d',' -f2)
          PROXY_USER=$(echo "$PROXY_LINE" | cut -d',' -f3)
          PROXY_PASS=$(echo "$PROXY_LINE" | cut -d',' -f4)

          HTTP_PROXY_VALUE="http://${PROXY_USER}:${PROXY_PASS}@${IP}:${PORT}"

          echo "::add-mask::${HTTP_PROXY_VALUE}"
          echo "::add-mask::${PROXY_USER}"
          echo "::add-mask::${PROXY_PASS}"

          echo "HTTP_PROXY=${HTTP_PROXY_VALUE}" >> "$GITHUB_ENV"
          echo "HTTPS_PROXY=${HTTP_PROXY_VALUE}" >> "$GITHUB_ENV"

          echo "Selected Webshare proxy: ${IP}:${PORT}"

      - name: Check proxy IP
        run: |
          echo "Direct IP:"
          curl --noproxy '*' -s https://api.ipify.org || true
          echo -e "\nProxy IP:"
          curl -s -x "$HTTP_PROXY" https://api.ipify.org || true
          echo -e "\n"

      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          # 重新启用并配置 xvfb-run 虚拟桌面，专门配合你的 launchChrome 逻辑
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
